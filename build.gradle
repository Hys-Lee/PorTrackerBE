plugins {
	id 'java'
	id 'org.springframework.boot' version '3.4.2' 
	id 'io.spring.dependency-management' version '1.1.7'
	id 'com.diffplug.spotless' version "6.25.0"
	id 'io.sentry.jvm.gradle' version "6.1.0"
}

group = 'com.PorTracker'
version = '0.0.1-SNAPSHOT'
description = 'PorTracker BE project for Spring Boot'

sentry {
	authToken = System.getenv("SENTRY_AUTH_TOKEN") ?: project.findProperty("SENTRY_AUTH_TOKEN")
	includeSourceContext = true
	org = "portracker"
	projectName = "portracker"
}

// 포맷터, 린터 공용 설정
spotless {
	java {
		target 'src/*/java/**/*.java'

		googleJavaFormat().aosp() // 구글 자바 스타일

		removeUnusedImports()

		trimTrailingWhitespace()
		endWithNewline()
	}
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-web'
	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
	annotationProcessor 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	implementation 'com.google.api-client:google-api-client:2.2.0'
    implementation 'com.google.oauth-client:google-oauth-client-jetty:1.34.1'
    implementation 'com.google.apis:google-api-services-sheets:v4-rev20220927-2.0.0' // googlesheet
	implementation 'com.google.auth:google-auth-library-oauth2-http:1.19.0'
	implementation 'com.google.apis:google-api-services-drive:v3-rev20230610-2.0.0'
	implementation 'org.springframework.boot:spring-boot-starter-webflux'
	implementation 'org.springframework.boot:spring-boot-starter-data-redis'
	implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.springframework.boot:spring-boot-starter-aop'
	implementation 'org.flywaydb:flyway-core'
	implementation 'org.flywaydb:flyway-database-postgresql'
	runtimeOnly 'org.postgresql:postgresql'
	implementation 'org.springframework.boot:spring-boot-starter-jdbc'
	implementation 'org.redisson:redisson-spring-boot-starter:3.27.0'
	implementation 'org.xerial:sqlite-jdbc:3.42.0.0'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.hibernate.orm:hibernate-community-dialects'
	implementation 'io.sentry:sentry-spring-boot-starter-jakarta:8.33.0'
	implementation 'io.jsonwebtoken:jjwt-api:0.12.5'
	implementation 'io.jsonwebtoken:jjwt-impl:0.12.5'
	implementation 'io.jsonwebtoken:jjwt-jackson:0.12.5'
	implementation 'org.springframework.boot:spring-boot-starter-security'
	runtimeOnly 'io.netty:netty-resolver-dns-native-macos'
	developmentOnly 'org.springframework.boot:spring-boot-docker-compose'
	implementation 'org.apache.httpcomponents.client5:httpclient5'
	implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.4'
}

tasks.named('test') {
	useJUnitPlatform()
}

tasks.withType(JavaCompile){
	options.compilerArgs << '-parameters'
}

test {
	useJUnitPlatform()
}
