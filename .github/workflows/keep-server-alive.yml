name: Keep Render Alive

on:
  schedule:
    # 매 10분마다 실행 (UTC 기준)
    - cron: "*/10 * * * *"
  workflow_dispatch: # 수동으로도 실행 가능하게 설정

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        # 서버의 Swagger UI나 Health Check 엔드포인트에 요청을 보냅니다.
        # Render 서버 주소를 여기에 넣으세요.
        run: |
          curl -I https://portrackerbe.onrender.com/api/v1/open/health 
          # 또는 https://portrackerbe.onrender.com/swagger-ui/index.html
