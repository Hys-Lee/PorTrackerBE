spring:
  jpa:
    open-in-view: false
  datasource:
    url: jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
    username: postgres.rllybwrgpaajludglaih
    password: ${SUPABASE_DATABASE_PW}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration/supabase
    baseline-on-migrate: true # 중요: 기존에 테이블이 있는 상태에서 도입할 때 필요
  jmx:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  jackson:
    deserialization:
      accept-float-as-int: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      security:
        protocol: ${SPRING_KAFKA_SECURITY_PROTOCOL:}
      sasl:
        mechanism: ${SPRING_KAFKA_SASL_MECHANISM:}
        jaas:
          config: ${SPRING_KAFKA_SASL_JAAS_CONFIG:}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: portracker-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
sentry:
  dsn: ${SENTRY_DSN}
  send-default-pii: true
  traces-sample-rate: 1.0
  exception-resolver-order: -2147483648
supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_KEY}
  jwt-secret: ${SUPABASE_JWT_SECRET}
google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}

app:
  encryption:
    key: ${APP_ENCRYPTION_KEY:}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slowCallDurationThreshold: 3s
        slowCallRateThreshold: 70
